# dnsmasq config for the KiSTI AP subnet.
# Listens ONLY on the AP interface — does not affect Jetson's own DNS
# resolution for upstream traffic.
#
# Deployed to /etc/dnsmasq.d/kisti.conf by install-ap.sh.
# The {{IFACE}} token is substituted by the installer.

interface={{IFACE}}
bind-interfaces
except-interface=lo

# Subnet 192.168.42.0/24, Jetson is .1, clients get .10–.100
dhcp-range=192.168.42.10,192.168.42.100,12h
dhcp-option=3,192.168.42.1
dhcp-option=6,192.168.42.1

# Local hostnames resolve to the Jetson
address=/kisti.local/192.168.42.1
address=/kisti/192.168.42.1

# Intercept iOS captive-portal probe ONLY for captive.apple.com.
# This is the primary probe; satisfying it keeps iOS happy without
# breaking other apple.com traffic (Music, iCloud, etc.) when an
# upstream uplink is later added.
address=/captive.apple.com/192.168.42.1

# Not a recursive resolver — we only answer for the names above.
# Clients fall through to their next configured resolver for everything
# else, which for the iOS app means routing those queries over the
# cellular interface (see iOS client docs).
no-resolv
no-hosts

# Useful while bringing this up; comment out once stable.
log-dhcp
