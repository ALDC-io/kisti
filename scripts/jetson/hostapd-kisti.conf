# KiSTI in-car WiFi access point — broadcasts "KiSTI" SSID
#
# Deployed to /etc/hostapd/hostapd-kisti.conf by install-ap.sh.
# The {{IFACE}} and {{PASSPHRASE}} tokens are substituted by the installer.
#
# Channel 6 (2.4 GHz) chosen for range over throughput — paddock parking
# lots and pit garages are RF-noisy at 5 GHz. Bandwidth requirement for
# voice + telemetry is ~1 Mbps; 2.4 GHz easily delivers that.

interface={{IFACE}}
driver=nl80211
ssid=KiSTI

# 2.4 GHz, 802.11n
hw_mode=g
channel=6
ieee80211n=1
wmm_enabled=1
country_code=US

# WPA2-PSK
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
wpa_passphrase={{PASSPHRASE}}

# Broadcast SSID so iPhone finds it without manual entry
ignore_broadcast_ssid=0

# Driver + passenger + pit crew tablet + a couple of phones
max_num_sta=8

# Journald logging
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2
