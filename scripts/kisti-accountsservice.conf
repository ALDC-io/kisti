# Ensure KiSTI AccountsService user file exists on every boot.
# Installed to /etc/tmpfiles.d/kisti-accountsservice.conf
# systemd-tmpfiles runs this before GDM starts.
#
# Uses C (copy) type — copies from /etc/kisti/accountsservice-aldc
# because tmpfiles 'f' type doesn't expand \n in content.
#
# Setup:
#   sudo mkdir -p /etc/kisti
#   printf '[User]\nSession=kisti-session\nSystemAccount=false\n' | sudo tee /etc/kisti/accountsservice-aldc
#   sudo cp scripts/kisti-accountsservice.conf /etc/tmpfiles.d/
#   sudo systemd-tmpfiles --create kisti-accountsservice.conf

C /var/lib/AccountsService/users/aldc 0644 root root - /etc/kisti/accountsservice-aldc
